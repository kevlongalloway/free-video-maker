# Render Blueprint — Free Video Maker (monorepo)
# Docs: https://render.com/docs/blueprint-spec
#       https://render.com/docs/monorepo-support
#
# Deploy: Render Dashboard -> New + -> Blueprint -> connect this repo.
# Render reads THIS file (it must stay at the repo root) and provisions the
# services below.
#
# ── Monorepo layout ──────────────────────────────────────────────
#   /api      → this backend (video generation: Whisper, Kokoro, Remotion)
#   /landing  → public marketing / sales site (Astro static site)
#   /app      → post-signup product frontend (Next.js)
#
# ── Per-directory deploys (no more full-repo redeploys) ──────────
# Each service sets `rootDir` (where its commands run) and a `buildFilter`
# so it ONLY redeploys when files inside ITS OWN directory change.
# NOTE: buildFilter paths are ALWAYS relative to the REPO ROOT, even though
# rootDir points at a subdirectory — that is a Render rule, not a typo.
services:
  # ── Backend API ─────────────────────────────────────────────────
  # Runs Whisper (STT), Kokoro (TTS) and headless Chrome + Remotion in one
  # process. It needs real memory. Do NOT use free/starter (512 MB) for
  # actual video generation — it will OOM. "standard" (2 GB) is the practical
  # minimum; "pro" (4 GB) matches the project's recommended 4 GB.
  - type: web
    name: free-video-maker-api
    runtime: docker
    rootDir: api
    # Paths below are relative to rootDir (api/).
    # Use the "tiny" image (tiny.en Whisper + q4 Kokoro) for lower memory.
    # Swap to ./main.Dockerfile for higher quality if you size up the plan.
    dockerfilePath: ./main-tiny.Dockerfile
    dockerContext: .
    plan: pro # pro = 4 GB / 2 CPU. Needed so Remotion + headless Chrome +
    #           Whisper + Kokoro don't OOM mid-render (2 GB "standard" does).
    region: oregon # change to your closest region (e.g. frankfurt, singapore)
    # The app reads process.env.PORT, which Render sets automatically.
    healthCheckPath: /
    # Only redeploy when something inside api/ changes.
    buildFilter:
      paths:
        - api/**
      ignoredPaths:
        - api/**/*.md
        - api/docs/**
    # Persistent storage for rendered videos under DATA_DIR_PATH (/app/data).
    # Without this, generated videos are lost on every redeploy/restart.
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      # REQUIRED. Get a free key at https://www.pexels.com/api/
      # Left blank on purpose so Render prompts you for it at deploy time.
      - key: PEXELS_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  # ── Landing / sales site (Astro static site) ────────────────────
  # SKELETON: base template only. Static sites are free on Render.
  - type: web
    name: free-video-maker-landing
    runtime: static
    rootDir: landing
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Only redeploy when something inside landing/ changes.
    buildFilter:
      paths:
        - landing/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Post-signup app (Next.js static export) ─────────────────────
  # SKELETON: base template only. Deploys as a Render static site.
  # next.config.mjs sets `output: "export"`, so `next build` emits a fully
  # static site to ./out — no Node server needed. Static sites are free.
  - type: web
    name: free-video-maker-app
    runtime: static
    rootDir: app
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    # Only redeploy when something inside app/ changes.
    buildFilter:
      paths:
        - app/**
    routes:
      # SPA-style fallback so client-side routes resolve.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URL of the backend API service above (baked in at build time).
      - key: NEXT_PUBLIC_API_URL
        sync: false
